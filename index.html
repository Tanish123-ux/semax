<!DOCTYPE html>
<html>
<head>
<title>Dynamic Webpage</title>

<script>
function changeContent()
{
    document.getElementById("demo").innerHTML = "Content Updated Successfully!";
}
</script>

</head>

<body>

<h2>Dynamic Web Page Example</h2>

<p id="demo">Original Content</p>

<button onclick="changeContent()">Ikde Daba ki</button>

</body>
</html>
